<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kraft.4u - Category</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Font Awesome for Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Page Header -->
    <div class="hero-banner py-4">
      <div class="container text-center position-relative">
        <h1 id="category-title">Loading Category...</h1>
        <p class="lead">Discover handmade treasures</p>
      </div>
    </div>

    <!-- Product Listing Section -->
    <div class="container my-5">
      <div id="product-list" class="row">
        <!-- Products will be dynamically loaded here -->
      </div>
    </div>

    <!-- WhatsApp Sidebar Button -->
    <a href="https://wa.me/+919541354578" class="whatsapp-button" target="_blank">
      <i class="fab fa-whatsapp"></i>
    </a>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Shared Data and Scripts -->
    <script src="components.js"></script>
    <script src="data.js"></script>
    <script src="script.js"></script>
    <!-- Page-specific script for dynamic content -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        console.log('Category page DOM loaded');
        
        // Wait for all scripts to load with retry
        const checkGetProducts = () => {
          if (typeof window.getProducts === 'function') {
            loadCategory();
          } else {
            console.warn('getProducts not ready, retrying...');
            setTimeout(checkGetProducts, 100);
          }
        };
        
        function loadCategory() {
          try {
            const params = new URLSearchParams(window.location.search);
            const category = params.get("category");
            const productListContainer = document.getElementById("product-list");

            console.log('Category param:', category);

            if (category) {
              const categoryName = decodeURIComponent(category);
              const currentProducts = window.getProducts();
              console.log('Products loaded:', currentProducts.length, 'total');

              // Update titles
              document.getElementById("category-title").textContent = categoryName;
              document.title = `kraft.4u - ${categoryName}`;

              if (categoryName === "Coming Soon") {
                productListContainer.innerHTML =
                  '<div class="text-center py-5"><h2 class="text-brand-pastel-indigo">Coming Soon!</h2><p class="text-muted">We are working on exciting new products. Stay tuned!</p><a href="store.html" class="btn btn-primary mt-3">Browse All Products</a></div>';
                return;
              }

              // Filter products based on the category
              let filteredProducts;
              if (categoryName === "All Products") {
                filteredProducts = currentProducts;
              } else {
                filteredProducts = currentProducts.filter(
                  (product) => product.category === categoryName
                );
              }
              console.log('Filtered products:', filteredProducts.length);

              // Clear existing content and display products
              productListContainer.innerHTML = "";

              if (filteredProducts.length > 0) {
                filteredProducts.forEach((product) => {
                  const newBadge = product.isNew ? '<span class="badge bg-success new-arrival-badge">NEW</span>' : '';
                  const productCard = `
                    <div class="col-lg-3 col-md-6 mb-4">
                      <div class="card h-100 product-card">
                        ${newBadge}
                        <a href="product.html?id=${product.id}">
                          <img src="${product.image}" class="card-img-top" alt="${product.name}">
                        </a>
                        <div class="card-body">
                          <h5 class="card-title">
                            <a href="product.html?id=${product.id}" class="text-decoration-none text-dark">${product.name}</a>
                          </h5>
                          <h6 class="card-subtitle mb-2 text-muted">₹${product.price}</h6>
                        </div>
                        <div class="card-footer text-center" style="background: transparent; border-top: none;">
                          <button class="btn btn-primary add-to-cart-btn" data-id="${product.id}">
                            <i class="fas fa-shopping-cart me-2"></i>Add to Cart
                          </button>
                        </div>
                      </div>
                    </div>
                  `;
                  productListContainer.innerHTML += productCard;
                });

                // Add event listeners to the new buttons
                document.querySelectorAll('.add-to-cart-btn').forEach(button => {
                    button.addEventListener('click', (e) => {
                        const productId = e.currentTarget.dataset.id;
                        const product = currentProducts.find(p => p.id === productId);
                        if (product) {
                            addToCart(product.id, product.name, product.price, product.image);
                        }
                    });
                });
              } else {
                productListContainer.innerHTML = '<div class="col-12 text-center py-5"><h4>No products found in this category.</h4><p>Try <a href="store.html">browsing all products</a> or select another category.</p></div>';
              }
            } else {
              // No category param - redirect to store
              document.getElementById("category-title").textContent = "Select a Category";
              productListContainer.innerHTML = '<div class="col-12 text-center py-5"><h4>Category Not Found</h4><p>Please select a category from the <a href="index.html">homepage</a> or <a href="store.html">store</a>.</p></div>';
            }
          } catch (error) {
            console.error('Category load error:', error);
            document.getElementById("product-list").innerHTML = '<div class="col-12 text-center py-5"><h4>Error loading category</h4><p>Please refresh the page or visit <a href="store.html">store.html</a>.</p></div>';
          }
        }
        
        checkGetProducts();
      });
    </script>
  </body>
</html>
